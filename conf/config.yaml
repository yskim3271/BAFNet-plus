defaults:
  - _self_
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

# Dataset related
sampling_rate: 16000
segment: auto       # "auto" -> RF-based auto calculation, or integer for manual
stride: auto        # "auto" -> segment // 2, or integer for manual
shift: auto         # "auto" -> segment // 2, or integer for manual
n_fft: 400
hop_size: 100
win_size: 400
compress_factor: 0.3

# noise augmentation for train
train_noise:
  snr_range: [-15, 20]
  reverb_proportion: 0.0
  target_dB_FS: -25
  target_dB_FS_floating_value: 10
  silence_length: 0.2
  bcs_gain_perturbation_db: 10  # set to 0 for backbone training

# noise augmentation for valid
valid_noise:
  snr_range: [-15, 10]
  reverb_proportion: 0.0
  target_dB_FS: -25
  target_dB_FS_floating_value: 0
  silence_length: 0.2
  deterministic: true

# noise augmentation for test
# Caution! To many SNR steps will cause OOM error
test_noise:
  snr_step: [0]
  reverb_proportion: 0.0
  target_dB_FS: -25
  target_dB_FS_floating_value: 0
  silence_length: 0.2
  deterministic: true

batch_size: 8
epochs: 150

eval_every: 150  # compute test metrics every so epochs
eval_stt: false
valid_start_epoch: 100  # skip validation before this epoch (0 = validate from start)

# Loss related
loss:
  magnitude: 0.9
  phase: 0.3
  complex: 0.1
  consistency: 0.05
  metric: 0.05

# Optimization related
lr: 2e-3
weight_decay: 0.01
optim: adamW
betas: [0.9, 0.999]
max_grad_norm: 5.0

# Schedule related (Cosine Annealing + Linear Warmup)
warmup_epochs: 30              # number of warmup epochs
warmup_start_factor: 0.1       # initial LR = base_lr * start_factor
eta_min: 1e-6                  # cosine minimum LR

# Finetune (auto-enabled for bafnet/bafnetplus models)
finetune:
  pretrained_lr: 4e-4
  pretrained_weight_decay: 0.0
  fusion_lr: 2e-3
  fusion_weight_decay: 0.01

# Logging and printing, and does not impact training
device: cuda
num_prints: 10
num_workers: 5

continue_from:
log_dir: tensorbd
save_code: true

# Other stuff
seed: 2039

# Hydra config
hydra:
  run:
    dir: ./results/experiments/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true
  job_logging:
    handlers:
      file:
        class: logging.FileHandler
        mode: w
        formatter: colorlog
        filename: trainer.log
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stderr